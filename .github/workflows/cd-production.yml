name: CD Production

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Skip if secrets are missing
        if: ${{ secrets.PRODUCTION_SSH_HOST == '' || secrets.PRODUCTION_SSH_USER == '' || secrets.PRODUCTION_SSH_KEY == '' }}
        run: echo "Missing production secrets. Set PRODUCTION_SSH_HOST, PRODUCTION_SSH_USER, PRODUCTION_SSH_KEY."

      - name: Deploy to production via SSH
        if: ${{ secrets.PRODUCTION_SSH_HOST != '' && secrets.PRODUCTION_SSH_USER != '' && secrets.PRODUCTION_SSH_KEY != '' }}
        env:
          SSH_HOST: ${{ secrets.PRODUCTION_SSH_HOST }}
          SSH_USER: ${{ secrets.PRODUCTION_SSH_USER }}
          SSH_KEY: ${{ secrets.PRODUCTION_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "$SSH_HOST" >> ~/.ssh/known_hosts
          ssh "$SSH_USER@$SSH_HOST" "cd /opt/make-it-art && git pull && docker compose --env-file infrastructure/.env -f infrastructure/docker-compose.yml up -d --build"

