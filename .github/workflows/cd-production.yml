name: CD Production

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  deploy:
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main') }}
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate deployment secrets
        env:
          SSH_HOST: ${{ secrets.PRODUCTION_SSH_HOST }}
          SSH_USER: ${{ secrets.PRODUCTION_SSH_USER }}
          SSH_KEY: ${{ secrets.PRODUCTION_SSH_KEY }}
        run: |
          set -eu
          missing=0
          for name in SSH_HOST SSH_USER SSH_KEY; do
            if [ -z "$(eval "printf '%s' \"\${$name}\"")" ]; then
              echo "Missing required secret: $name"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            echo "Set production environment secrets PRODUCTION_SSH_HOST, PRODUCTION_SSH_USER, PRODUCTION_SSH_KEY."
            exit 1
          fi

      - name: Deploy to production via SSH
        env:
          SSH_HOST: ${{ secrets.PRODUCTION_SSH_HOST }}
          SSH_USER: ${{ secrets.PRODUCTION_SSH_USER }}
          SSH_KEY: ${{ secrets.PRODUCTION_SSH_KEY }}
          SSH_PORT: ${{ secrets.PRODUCTION_SSH_PORT }}
          APP_DIR: ${{ vars.PRODUCTION_APP_DIR }}
          DEPLOY_BRANCH: main
        run: |
          set -eu
          : "${SSH_PORT:=22}"
          : "${APP_DIR:=/root/make-it-art}"
          mkdir -p ~/.ssh
          printf "%s\n" "$SSH_KEY" | tr -d '\r' > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keygen -y -f ~/.ssh/id_ed25519 > /dev/null
          ssh-keyscan -p "$SSH_PORT" -H "$SSH_HOST" >> ~/.ssh/known_hosts
          ssh -i ~/.ssh/id_ed25519 -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" <<EOF
          set -eu
          cd "$APP_DIR"
          git checkout "$DEPLOY_BRANCH"
          git pull --ff-only origin "$DEPLOY_BRANCH"
          docker compose --env-file infrastructure/.env.production -f infrastructure/docker-compose.prod.yml build --no-cache
          docker compose --env-file infrastructure/.env.production -f infrastructure/docker-compose.prod.yml up -d
          docker compose --env-file infrastructure/.env.production -f infrastructure/docker-compose.prod.yml ps
          EOF
