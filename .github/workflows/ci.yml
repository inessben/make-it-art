name: CI

on:
  pull_request:
    branches: [develop, main]
  push:
    branches: [develop]

jobs:
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install frontend deps
        run: npm install --legacy-peer-deps
      - name: Frontend lint
        run: npm run lint
      - name: Frontend format check
        run: npm run format:check

  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install backend deps
        run: npm install
      - name: Backend lint
        run: npm run lint
      - name: Backend format check
        run: npm run format:check

  compose_config:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Validate compose syntax
        run: docker compose --env-file infrastructure/.env.example -f infrastructure/docker-compose.yml config > /dev/null
